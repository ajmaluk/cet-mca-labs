<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Registration Form - CET MCA Lab</title>
    <meta name="description" content="Responsive Job Registration Form implementation for CET MCA Web Programming Lab.">
    <meta name="keywords" content="CET MCA, Web Lab, HTML Form, Registration, CSS Glassmorphism">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-color);
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="date"],
        input[type="password"],
        textarea,
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .radio-group input,
        .checkbox-group input {
            width: auto;
            margin-right: 5px;
        }

        .radio-group label,
        .checkbox-group label {
            display: inline-block;
            margin-bottom: 0;
            font-weight: 400;
        }

        .btn-container {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background-color: var(--primary-dark);
        }

        .reset-btn {
            background-color: #e2e8f0;
            color: var(--text-color);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>

<body class="fade-in">
    <div class="container" style="max-width: 700px;">
        <h1 class="main-title">Job Registration</h1>

        <form action="#" method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" name="name" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" name="dob" id="dob" required>
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group" style="padding-top: 0.5rem;">
                        <label><input type="radio" name="gender" value="male"> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                        <label><input type="radio" name="gender" value="other"> Other</label>
                    </div>
                </div>
            </div>

            <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label for="mob">Mobile Number</label>
                    <input type="number" name="mob" id="mob" placeholder="9876543210" required>
                </div>
            </div>

            <div class="form-group">
                <label for="address">Postal Address</label>
                <textarea name="address" id="address" rows="3" placeholder="Enter your complete address"></textarea>
            </div>

            <div class="form-group">
                <label>Languages Known</label>
                <div class="checkbox-group" style="padding-top: 0.5rem;">
                    <label><input type="checkbox" name="lang" value="mal"> Malayalam</label>
                    <label><input type="checkbox" name="lang" value="hin"> Hindi</label>
                    <label><input type="checkbox" name="lang" value="eng"> English</label>
                </div>
            </div>

            <div class="form-group">
                <label for="file">Upload CV (PDF/Word)</label>
                <input type="file" name="file" id="file" style="border: none; padding: 0;">
            </div>

            <div class="form-group">
                <label for="password">Create Password</label>
                <input type="password" name="password" id="password" required>
            </div>

            <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label for="security_ques">Security Question</label>
                    <select name="security_ques" id="security_ques">
                        <option value="">Select a question</option>
                        <option value="nick">What is your nickname?</option>
                        <option value="color">What is your favorite color?</option>
                        <option value="school">What was your first school?</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="answer">Security Answer</label>
                    <input type="text" name="answer" id="answer" placeholder="Your answer">
                </div>
            </div>

            <div class="btn-container">
                <button type="submit" class="submit-btn"
                    onclick="alert('Form submitted successfully!'); return false;">Submit Application</button>
                <button type="reset" class="reset-btn">Reset Form</button>
            </div>
        </form>
    </div>
</body>

</html>
