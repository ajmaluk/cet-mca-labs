<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yearly Calendar Generator - Program 8</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .input-card {
      background: white;
      padding: 2rem;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      text-align: center;
      margin-bottom: 2rem;
    }

    .input-group {
      display: flex;
      justify-content: center;
      gap: 1rem;
      align-items: center;
      margin-top: 1rem;
    }

    input[type="number"] {
      padding: 0.75rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      width: 140px;
      font-size: 1rem;
    }

    #calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .month-card {
      background: white;
      padding: 1.5rem;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      animation: fadeIn 0.5s ease-out;
      border: 1px solid var(--glass-border);
    }

    .month-card h3 {
      text-align: center;
      color: var(--primary-color);
      font-size: 1.25rem;
      margin-bottom: 1rem;
    }

    table {
      font-size: 0.875rem;
      box-shadow: none;
      margin: 0;
    }

    th {
      background: #f1f5f9;
      color: var(--text-color);
      font-weight: 700;
      border: none;
    }

    td {
      border: none;
      font-weight: 500;
    }

    td.today {
      background: var(--primary-color);
      color: white;
      border-radius: 50%;
      width: 20px;
    }

    td.empty {
      background: transparent;
    }
  </style>
</head>

<body class="fade-in">
  <div class="container" style="max-width: 1200px;">
    <h1 class="main-title">Dynamic Calendar Generator</h1>

    <div class="input-card">
      <h2>Select a Year</h2>
      <p style="color: var(--text-muted);">Enter a year to generate a complete 12-month calendar.</p>
      <div class="input-group">
        <input type="number" id="yearInput" value="2024" min="1000" max="9999">
        <button class="btn" style="border: none; cursor: pointer;" onclick="generateCalendar()">Generate Full
          Year</button>
      </div>
    </div>

    <div id="calendar-grid"></div>
  </div>

  <script>
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    function generateCalendar() {
      const year = parseInt(document.getElementById('yearInput').value);
      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';

      if (!year) return;

      for (let month = 0; month < 12; month++) {
        const card = document.createElement('div');
        card.classList.add('month-card');

        const title = document.createElement('h3');
        title.textContent = `${monthNames[month]} ${year}`;
        card.appendChild(title);

        const table = document.createElement('table');
        const headRow = document.createElement('tr');
        ["S", "M", "T", "W", "T", "F", "S"].forEach(d => {
          const th = document.createElement('th');
          th.textContent = d;
          headRow.appendChild(th);
        });
        table.appendChild(headRow);

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let date = 1;

        for (let i = 0; i < 6; i++) {
          const row = document.createElement('tr');
          for (let j = 0; j < 7; j++) {
            const td = document.createElement('td');
            if (i === 0 && j < firstDay || date > daysInMonth) {
              td.classList.add('empty');
            } else {
              td.textContent = date++;
            }
            row.appendChild(td);
          }
          table.appendChild(row);
          if (date > daysInMonth) break;
        }

        card.appendChild(table);
        grid.appendChild(card);
      }
    }

    // Initialize with current year
    document.getElementById('yearInput').value = new Date().getFullYear();
    generateCalendar();
  </script>
</body>

</html>
