<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Multimedia - CET MCA Lab</title>
    <meta name="description" content="Hover-based multimedia transformation experiment for CET MCA Semester 1.">
    <meta name="keywords" content="CET MCA, Web Lab, Multimedia, CSS Hover, JavaScript Interaction, MCA Lab">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .interactive-container {
            position: relative;
            width: 100%;
            height: 500px;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease, filter 0.5s ease;
        }

        .overlay-content {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-align: center;
            padding: 2rem;
        }

        .interactive-container:hover .bg-image {
            transform: scale(1.1);
            filter: blur(2px);
        }

        .interactive-container:hover .overlay-content {
            opacity: 1;
        }

        .main-text {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .sub-text {
            font-size: 1.25rem;
            opacity: 0.9;
            margin-top: 1rem;
        }
    </style>
</head>

<body class="fade-in">
    <div class="container">
        <h1 class="main-title">Hover Interaction</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Hover over the image to trigger
            the transformation</p>

        <div id="interactive-box" class="interactive-container">
            <img id="display-image" class="bg-image"
                src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=1000"
                alt="Space Interface">
            <div class="overlay-content">
                <h2 id="display-text" class="main-text">Inertia</h2>
                <p class="sub-text">"An object at rest stays at rest unless acted upon."</p>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById("interactive-box");
        const image = document.getElementById("display-image");
        const text = document.getElementById("display-text");

        const originalSrc = "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=1000";
        const hoverSrc = "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&q=80&w=1000";

        container.addEventListener("mouseenter", () => {
            image.src = hoverSrc;
            text.innerText = "Momentum";
        });

        container.addEventListener("mouseleave", () => {
            image.src = originalSrc;
            text.innerText = "Inertia";
        });
    </script>
</body>

</html>
