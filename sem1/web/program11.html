<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Registration with Validation - CET MCA Lab</title>
    <meta name="description" content="Complete Registration Form with JavaScript Validation for CET MCA students.">
    <meta name="keywords" content="CET MCA, Web Lab, Validation, Regex, Form Handling, MCA Lab">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .form-card {
            background: white;
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            max-width: 800px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-color);
        }

        input:not([type="radio"]):not([type="checkbox"]),
        select,
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.8125rem;
            margin-top: 0.25rem;
            display: none;
            font-weight: 500;
        }

        input.invalid {
            border-color: #ef4444;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .required-star {
            color: #ef4444;
            margin-left: 2px;
        }

        .btn-container {
            display: flex;
            gap: 1rem;
            margin-top: 2.5rem;
            justify-content: center;
        }

        button {
            border: none;
            cursor: pointer;
            padding: 0.75rem 2.5rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .submit-btn {
            background: var(--primary-color);
            color: white;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .reset-btn {
            background: #f1f5f9;
            color: var(--text-color);
        }
    </style>
</head>

<body class="fade-in">
    <div class="container" style="max-width: 900px;">
        <h1 class="main-title">Registration with Validation</h1>

        <div class="form-card">
            <form id="regForm" novalidate>
                <div class="form-group">
                    <label for="name">Full Name <span class="required-star">*</span></label>
                    <input type="text" id="name" name="name" placeholder="John Doe">
                    <span class="error-msg" id="name-error">Please enter your full name.</span>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label for="dob">Date of Birth <span class="required-star">*</span></label>
                        <input type="date" id="dob" name="dob">
                        <span class="error-msg" id="dob-error">Please select your date of birth.</span>
                    </div>
                    <div class="form-group">
                        <label>Gender <span class="required-star">*</span></label>
                        <div style="display: flex; gap: 1rem; padding: 0.75rem 0;">
                            <label style="font-weight: 400;"><input type="radio" name="gender" value="male">
                                Male</label>
                            <label style="font-weight: 400;"><input type="radio" name="gender" value="female">
                                Female</label>
                        </div>
                        <span class="error-msg" id="gender-error">Please select your gender.</span>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label for="email">Email <span class="required-star">*</span></label>
                        <input type="email" id="email" name="email" placeholder="john@example.com">
                        <span class="error-msg" id="email-error">Please enter a valid email address.</span>
                    </div>
                    <div class="form-group">
                        <label for="mob">Mobile Number <span class="required-star">*</span></label>
                        <input type="tel" id="mob" name="mob" placeholder="10-digit number">
                        <span class="error-msg" id="mob-error">Please enter a 10-digit mobile number.</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Address <span class="required-star">*</span></label>
                    <textarea id="address" name="address" rows="3"></textarea>
                    <span class="error-msg" id="address-error">Please enter your address.</span>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label for="password">Password <span class="required-star">*</span></label>
                        <input type="password" id="password" name="password">
                        <span class="error-msg" id="password-error">Password must be at least 6 characters.</span>
                    </div>
                    <div class="form-group">
                        <label for="file">Upload CV <span class="required-star">*</span></label>
                        <input type="file" id="file" name="file">
                        <span class="error-msg" id="file-error">Please upload your CV.</span>
                    </div>
                </div>

                <div class="btn-container">
                    <button type="submit" class="submit-btn" id="submitBtn">Complete Registration</button>
                    <button type="reset" class="reset-btn">Reset</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('regForm');

        const showError = (id, show) => {
            const err = document.getElementById(`${id}-error`);
            const input = document.getElementById(id);
            err.style.display = show ? 'block' : 'none';
            if (input) input.classList.toggle('invalid', show);
        };

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            let isValid = true;

            // Reset errors
            document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');
            document.querySelectorAll('input').forEach(el => el.classList.remove('invalid'));

            // Name
            if (!document.getElementById('name').value.trim()) {
                showError('name', true);
                isValid = false;
            }

            // DOB
            if (!document.getElementById('dob').value) {
                showError('dob', true);
                isValid = false;
            }

            // Gender
            if (!document.querySelector('input[name="gender"]:checked')) {
                document.getElementById('gender-error').style.display = 'block';
                isValid = false;
            }

            // Email
            const email = document.getElementById('email').value;
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('email', true);
                isValid = false;
            }

            // Mobile
            const mob = document.getElementById('mob').value;
            if (!/^\d{10}$/.test(mob)) {
                showError('mob', true);
                isValid = false;
            }

            // Address
            if (!document.getElementById('address').value.trim()) {
                showError('address', true);
                isValid = false;
            }

            // Password
            if (document.getElementById('password').value.length < 6) {
                showError('password', true);
                isValid = false;
            }

            // File
            if (!document.getElementById('file').value) {
                showError('file', true);
                isValid = false;
            }

            if (isValid) {
                // Success animation/feedback
                const btn = document.getElementById('submitBtn');
                btn.innerHTML = 'Success! ✓';
                btn.style.background = '#22c55e';
                setTimeout(() => {
                    alert("Registration Successful!");
                    form.reset();
                    btn.innerHTML = 'Complete Registration';
                    btn.style.background = '';
                }, 500);
            }
        });
    </script>
</body>

</html>
